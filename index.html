<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloxflip Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap');

:root{
  --bg1:#1c1f24; --bg2:#101114;
  --card:#23262c; --line:#393d45;
  --txt:#f3f5f8; --muted:#9298a1;
  --green:#1fe08c; --green-d:#0a7a48; --green-t:#37e89b;
  --blue:#1ba3ff; --amber:#e0a92e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Montserrat',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(130% 110% at 50% -10%, var(--bg1), var(--bg2));
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 18px;color:var(--txt);
}
.app{width:100%;max-width:440px;}

/* header */
.head{display:flex;align-items:center;gap:13px;justify-content:center;}
.logo{
  width:48px;height:48px;border-radius:14px;flex:none;
  background:linear-gradient(160deg,#2c3037,#191b1f);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 0 #0b0c0e, 0 12px 20px rgba(0,0,0,.5);
}
.head h1{font-size:23px;font-weight:800;letter-spacing:.3px;}
.head h1 span{color:var(--green);}
.hint{text-align:center;color:var(--muted);font-size:12px;font-weight:600;margin:10px 0 18px;letter-spacing:.2px;}

/* card */
.card{
  background:linear-gradient(180deg,var(--card),#1d2025);
  border:1px solid var(--line);border-radius:22px;padding:20px;
  box-shadow:0 10px 0 #0d0e11, 0 20px 40px rgba(0,0,0,.55);
}
.label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}

/* fields */
.field{
  display:flex;align-items:center;gap:11px;
  background:#16181c;border:2px solid #30343b;border-radius:15px;
  padding:13px 15px;transition:border-color .15s,transform .26s;
}
.field:focus-within{border-color:var(--blue);}
.field.result{background:#15201a;border-color:#2a6b4f;}
.field.result:focus-within{border-color:var(--green-t);}
.input{
  flex:1;background:none;border:none;outline:none;color:var(--txt);caret-color:var(--blue);
  font-family:inherit;font-size:28px;font-weight:800;min-width:0;width:100%;
}
.input::placeholder{color:#4d525a;}
.input.green{color:var(--green-t);caret-color:var(--green-t);}

.rbx{flex:none;display:block;}

/* swap */
.swap{display:flex;align-items:center;gap:10px;margin:12px 2px;}
.swap .ln{flex:1;height:1px;background:var(--line);}
.swap .dot{
  width:34px;height:34px;border-radius:50%;flex:none;
  background:#16181c;border:1px solid var(--line);color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;
}

/* formula line */
.formula{font-size:11.5px;color:#7fd9b0;font-weight:600;margin-top:9px;letter-spacing:.2px;text-align:center;}
.chain{font-weight:800;color:#b6f2d4;}

/* fx block */
.fx{margin-top:16px;border-top:1px solid #2c3037;padding-top:14px;display:flex;flex-direction:column;gap:8px;}
.fx-row{display:flex;align-items:baseline;gap:8px;justify-content:center;flex-wrap:wrap;}
.fx-row .approx{font-size:15px;color:var(--muted);font-weight:700;}
.fx-row .amt{font-size:24px;font-weight:800;color:#d7dbe1;}
.fx-row .amt.chf{color:#cdd6e6;}
.fx-row small{font-size:10.5px;color:#6b7077;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.st-live{color:var(--green-t);font-weight:800;}
.st-off{color:var(--amber);font-weight:800;}
.st-load{color:var(--muted);font-weight:700;}

/* house */
.house{
  width:100%;margin-top:18px;border:none;cursor:pointer;font-family:inherit;
  font-weight:800;font-size:16px;letter-spacing:.5px;color:#d0d5dc;text-transform:uppercase;
  background:linear-gradient(180deg,#3a3f47,#2c3037);border-radius:16px;padding:16px;
  box-shadow:0 5px 0 #1b1e23;display:flex;align-items:center;justify-content:center;gap:11px;
  transition:transform .07s, box-shadow .07s, background .18s, color .18s, filter .15s;
}
.house:active{transform:translateY(4px);box-shadow:0 1px 0 #1b1e23;}
.house.on{
  color:#06160e;background:linear-gradient(180deg,var(--green),#13b873);
  box-shadow:0 5px 0 var(--green-d), 0 0 24px rgba(31,224,140,.42);
}
.house .pct{font-size:12px;padding:3px 9px;border-radius:9px;background:rgba(0,0,0,.22);font-weight:800;}
.house.on .pct{background:rgba(255,255,255,.28);}
.hstate{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;font-weight:600;letter-spacing:.3px;}

/* desktop hover (skipped on touch) */
@media (hover:hover){
  .house:hover{filter:brightness(1.09);}
  .swap .dot{transition:color .15s,border-color .15s;}
}

@keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.035)}100%{transform:scale(1)}}
.pop{animation:pop .26s ease;}
@media (prefers-reduced-motion: reduce){.pop{animation:none;}.house,.field{transition:none;}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="rbxGold" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffd84d"/><stop offset="1" stop-color="#d6920f"/>
  </linearGradient>
</defs></svg>

<div class="app">
  <div class="head">
    <div class="logo">
      <svg class="rbx" width="30" height="30" viewBox="0 0 32 32" aria-hidden="true">
        <polygon points="16,1.5 28.6,8.75 28.6,23.25 16,30.5 3.4,23.25 3.4,8.75" fill="url(#rbxGold)" stroke="#a86d08" stroke-width="1"/>
        <text x="16" y="22.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="900" fill="#fff">R</text>
      </svg>
    </div>
    <h1>Bloxflip <span>Calculator</span></h1>
  </div>
  <div class="hint">Fill in either field &mdash; it converts both ways</div>

  <div class="card">
    <div class="label">Amount</div>
    <div class="field" id="amtField">
      <svg class="rbx" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
        <polygon points="16,1.5 28.6,8.75 28.6,23.25 16,30.5 3.4,23.25 3.4,8.75" fill="url(#rbxGold)" stroke="#a86d08" stroke-width="1"/>
        <text x="16" y="22.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="900" fill="#fff">R</text>
      </svg>
      <input class="input" id="amt" type="text" inputmode="decimal" placeholder="0" value="1000" autocomplete="off">
    </div>

    <div class="swap"><span class="ln"></span><span class="dot">&#8645;</span><span class="ln"></span></div>

    <div class="label">Result</div>
    <div class="field result" id="baseField">
      <svg class="rbx" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
        <polygon points="16,1.5 28.6,8.75 28.6,23.25 16,30.5 3.4,23.25 3.4,8.75" fill="url(#rbxGold)" stroke="#a86d08" stroke-width="1"/>
        <text x="16" y="22.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="900" fill="#fff">R</text>
      </svg>
      <input class="input green" id="base" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
    </div>
    <div class="formula">result <span class="chain" id="chain">+30% +30%</span> = amount</div>

    <div class="fx">
      <div class="fx-row">
        <span class="approx">&#8776;</span>
        <span class="amt" id="usd">$0.00</span>
        <small>
          <svg width="12" height="12" viewBox="0 0 32 32" aria-hidden="true">
            <polygon points="16,1.5 28.6,8.75 28.6,23.25 16,30.5 3.4,23.25 3.4,8.75" fill="url(#rbxGold)"/>
          </svg>500 = $1
        </small>
      </div>
      <div class="fx-row">
        <span class="approx">&#8776;</span>
        <span class="amt chf" id="chf">CHF 0.00</span>
        <small id="rateNote">$1 = CHF &hellip; &middot; <span class="st-load">loading</span></small>
      </div>
    </div>

    <button class="house" id="house">
      <span>&#127968; House</span>
      <span class="pct">+2.7%</span>
    </button>
    <div class="hstate" id="hstate">off &middot; tap to activate</div>
  </div>
</div>

<script>
var MARKUP = 1.3 * 1.3;    // +30% +30% = 1.69
var HOUSE  = 1.027;         // +2.7%
var FALLBACK_CHF = 0.807;   // used only if live rate can't load
var houseOn = false;
var lastEdited = 'amount';
var usdChf = null;
var currentN = NaN;

var amtEl    = document.getElementById('amt');
var baseEl   = document.getElementById('base');
var amtField = document.getElementById('amtField');
var baseField= document.getElementById('baseField');
var usdEl    = document.getElementById('usd');
var chfEl    = document.getElementById('chf');
var rateNote = document.getElementById('rateNote');
var chainEl  = document.getElementById('chain');
var houseBtn = document.getElementById('house');
var hstate   = document.getElementById('hstate');

var nf    = new Intl.NumberFormat('en-US', {maximumFractionDigits: 2});
var nfUsd = new Intl.NumberFormat('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

function parseNum(s){
  if(!s) return NaN;
  s = s.replace(/[\u2019'\s]/g, '');
  if(s.indexOf('.') !== -1){ s = s.replace(/,/g, ''); }
  else { s = s.replace(/,/g, '.'); }
  return parseFloat(s);
}

function chain(){ return MARKUP * (houseOn ? HOUSE : 1); }

function applyAmount(n){
  currentN = n;
  if(isNaN(n)){ usdEl.textContent = '$0.00'; chfEl.textContent = 'CHF 0.00'; return; }
  var usd = n / 500;
  usdEl.textContent = '$' + nfUsd.format(usd);
  chfEl.textContent = (usdChf == null) ? 'CHF \u2026' : 'CHF ' + nfUsd.format(usd * usdChf);
}

function fromAmount(){
  lastEdited = 'amount';
  chainEl.textContent = houseOn ? '+30% +30% +2.7%' : '+30% +30%';
  var n = parseNum(amtEl.value);
  if(isNaN(n)){ baseEl.value = ''; applyAmount(NaN); return; }
  baseEl.value = nf.format(n / chain());
  applyAmount(n);
}

function fromBase(){
  lastEdited = 'base';
  chainEl.textContent = houseOn ? '+30% +30% +2.7%' : '+30% +30%';
  var x = parseNum(baseEl.value);
  if(isNaN(x)){ amtEl.value = ''; applyAmount(NaN); return; }
  var n = x * chain();
  amtEl.value = nf.format(n);
  applyAmount(n);
}

function pop(el){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }

function setRate(rate, status){
  usdChf = rate;
  var cls = status === 'live' ? 'st-live' : (status === 'offline' ? 'st-off' : 'st-load');
  var shown = Math.round(rate * 1000) / 1000;
  rateNote.innerHTML = '$1 = CHF ' + shown + ' &middot; <span class="' + cls + '">' + status + '</span>';
  applyAmount(currentN);
}

function loadRate(){
  fetch('https://open.er-api.com/v6/latest/USD')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d && d.rates && typeof d.rates.CHF === 'number'){ setRate(d.rates.CHF, 'live'); }
      else { throw new Error('no CHF'); }
    })
    .catch(function(){
      fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=CHF')
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d && d.rates && typeof d.rates.CHF === 'number'){ setRate(d.rates.CHF, 'live'); }
          else { throw new Error('no CHF'); }
        })
        .catch(function(){ setRate(FALLBACK_CHF, 'offline'); });
    });
}

amtEl.addEventListener('input', fromAmount);
baseEl.addEventListener('input', fromBase);

houseBtn.addEventListener('click', function(){
  houseOn = !houseOn;
  houseBtn.classList.toggle('on', houseOn);
  hstate.innerHTML = houseOn ? 'on &middot; +2.7% active' : 'off &middot; tap to activate';
  if(lastEdited === 'base'){ fromBase(); pop(amtField); }
  else { fromAmount(); pop(baseField); }
});

fromAmount();
loadRate();
</script>
</body>
</html>
